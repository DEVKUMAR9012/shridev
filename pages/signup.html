<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up · Shridev</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-container {
            width: 100%;
            max-width: 1100px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 30px 60px -30px rgba(0,0,0,0.15);
        }
        .auth-brand {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 50px;
            color: white;
        }
        .brand-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
        .brand-logo i { font-size: 40px; }
        .brand-logo span { font-size: 28px; font-weight: 800; }
        .auth-brand h2 { font-size: 32px; margin-bottom: 16px; }
        .brand-features { list-style: none; margin-top: 30px; }
        .brand-features li { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .auth-form-side {
            flex: 1;
            padding: 50px;
            background: white;
            overflow-y: auto;
            max-height: 90vh;
        }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h2 { font-size: 28px; color: #2c3e50; }
        .auth-header p a { color: #667eea; text-decoration: none; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .input-group { position: relative; }
        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 14px 16px 14px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
        }
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
        }
        .form-options { margin-bottom: 25px; }
        .remember-me { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(102,126,234,0.5);
        }
        .auth-btn.loading {
            position: relative;
            color: transparent;
            pointer-events: none;
        }
        .auth-btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        .alert.error { background: #fee2e2; color: #dc2626; border-left: 4px solid #dc2626; }
        .alert.success { background: #e0f2fe; color: #0284c7; border-left: 4px solid #0284c7; }
        @media (max-width: 768px) {
            .auth-container { flex-direction: column; max-width: 450px; }
            .auth-brand { padding: 30px; text-align: center; }
            .auth-form-side { padding: 30px; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-brand">
            <div class="brand-logo"><i class="fas fa-gem"></i><span>Shridev</span></div>
            <h2>Start Your Journey! 🚀</h2>
            <p>Join 10,000+ engineering students</p>
            <ul class="brand-features">
                <li><i class="fas fa-check-circle"></i> Free access to all features</li>
                <li><i class="fas fa-check-circle"></i> No credit card required</li>
                <li><i class="fas fa-check-circle"></i> Track your progress</li>
                <li><i class="fas fa-check-circle"></i> Personalized study plans</li>
            </ul>
        </div>
        <div class="auth-form-side">
            <div class="auth-header">
                <h2>Create Free Account</h2>
                <p>Already have an account? <a href="login.html">Login</a></p>
            </div>
            
            <div class="alert error" id="errorAlert">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorMessage"></span>
            </div>
            
            <div class="alert success" id="successAlert">
                <i class="fas fa-check-circle"></i>
                <span id="successMessage"></span>
            </div>
            
            <form id="signupForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="fullname" placeholder="Enter your full name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Create a password (min 6 chars)" required>
                        <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                    </div>
                    <small id="passwordHint" style="color: #666; font-size: 12px;"></small>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Engineering Branch</label>
                    <div class="input-group">
                        <i class="fas fa-graduation-cap"></i>
                        <select id="branch">
                            <option value="">Select your branch</option>
                            <option value="Computer Science">Computer Science Engineering</option>
                            <option value="Electronics">Electronics & Communication</option>
                            <option value="Electrical">Electrical Engineering</option>
                            <option value="Mechanical">Mechanical Engineering</option>
                            <option value="Civil">Civil Engineering</option>
                            <option value="Information Technology">Information Technology</option>
                            <option value="AI & ML">Artificial Intelligence & ML</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Year of Study</label>
                    <div class="input-group">
                        <i class="fas fa-calendar"></i>
                        <select id="year">
                            <option value="">Select year</option>
                            <option value="1st Year">1st Year</option>
                            <option value="2nd Year">2nd Year</option>
                            <option value="3rd Year">3rd Year</option>
                            <option value="4th Year">4th Year</option>
                            <option value="Graduated">Graduated</option>
                        </select>
                    </div>
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="terms" required>
                        <span>I agree to the <a href="#" style="color: #667eea;">Terms of Service</a> and <a href="#" style="color: #667eea;">Privacy Policy</a></span>
                    </label>
                </div>
                <button type="submit" class="auth-btn" id="signupBtn">
                    <i class="fas fa-user-plus"></i> Create Free Account
                </button>
            </form>
        </div>
    </div>

    <script>
        // Password strength checker
        document.getElementById('password').addEventListener('input', function() {
            const password = this.value;
            const hint = document.getElementById('passwordHint');
            
            if (password.length === 0) {
                hint.textContent = '';
                return;
            }
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/)) strength++;
            if (password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;
            
            const strengthText = ['Very Weak', 'Weak', 'Fair', 'Good', 'Strong'];
            const colors = ['#ef4444', '#f59e0b', '#fbbf24', '#22c55e', '#22c55e'];
            
            hint.textContent = `Strength: ${strengthText[strength-1] || 'Very Weak'}`;
            hint.style.color = colors[strength-1] || '#ef4444';
        });
        
        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const pwd = document.getElementById('password');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
            this.classList.toggle('fa-eye-slash');
        });
        
        function showError(message) {
            const alert = document.getElementById('errorAlert');
            document.getElementById('errorMessage').textContent = message;
            alert.style.display = 'flex';
            setTimeout(() => alert.style.display = 'none', 4000);
        }
        
        function showSuccess(message) {
            const alert = document.getElementById('successAlert');
            document.getElementById('successMessage').textContent = message;
            alert.style.display = 'flex';
            setTimeout(() => alert.style.display = 'none', 3000);
        }
        
        // Signup handler
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullname = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const branch = document.getElementById('branch').value;
            const year = document.getElementById('year').value;
            const terms = document.getElementById('terms').checked;
            const btn = document.getElementById('signupBtn');
            
            // Validation
            if (!fullname) return showError('Please enter your full name');
            if (!email) return showError('Please enter your email');
            if (!email.includes('@') || !email.includes('.')) return showError('Please enter a valid email');
            if (!password) return showError('Please enter a password');
            if (password.length < 6) return showError('Password must be at least 6 characters');
            if (password !== confirmPassword) return showError('Passwords do not match');
            if (!branch) return showError('Please select your branch');
            if (!year) return showError('Please select your year');
            if (!terms) return showError('Please accept Terms of Service');
            
            btn.classList.add('loading');
            btn.disabled = true;
            
            try {
                const response = await fetch('http://localhost:5001/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        name: fullname, 
                        email: email, 
                        password: password,
                        branch: branch,
                        year: year
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showSuccess('Account created successfully! 🎉 Redirecting to login...');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showError(data.message || 'Signup failed');
                }
            } catch (error) {
                console.error('Signup error:', error);
                showError('Cannot connect to server. Please make sure backend is running.');
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });
        
        // Check if already logged in
        if (localStorage.getItem('shridev_user') || sessionStorage.getItem('shridev_user')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
