<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · Shridev</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 20s infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        .auth-container {
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 48px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .logo-section { text-align: center; margin-bottom: 32px; }
        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .logo-icon i { font-size: 36px; color: white; }
        .logo-section h2 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-section p { color: #6b7280; font-size: 14px; margin-top: 8px; }
        .form-group { margin-bottom: 24px; }
        .input-wrapper { position: relative; }
        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 18px;
        }
        .input-wrapper input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }
        .input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #9ca3af;
        }
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }
        .checkbox-label { display: flex; align-items: center; gap: 10px; cursor: pointer; color: #6b7280; font-size: 14px; }
        .checkbox-label input[type="checkbox"] { width: 18px; height: 18px; accent-color: #667eea; }
        .forgot-link { color: #667eea; text-decoration: none; font-size: 14px; }
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 24px;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px -10px rgba(102, 126, 234, 0.5); }
        .login-btn.loading { position: relative; color: transparent; pointer-events: none; }
        .login-btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .divider { text-align: center; margin: 24px 0; position: relative; }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: calc(50% - 60px);
            height: 1px;
            background: #e5e7eb;
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .divider span { background: white; padding: 0 16px; color: #9ca3af; font-size: 13px; }
        .social-login { display: flex; gap: 16px; justify-content: center; margin-bottom: 24px; }
        .social-btn {
            flex: 1;
            padding: 12px;
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
            color: #374151;
            transition: all 0.3s;
        }
        .social-btn:hover { transform: translateY(-2px); }
        .social-btn.google:hover { border-color: #DB4437; color: #DB4437; }
        .social-btn.github:hover { border-color: #333; color: #333; }
        .signup-link { text-align: center; color: #6b7280; font-size: 14px; }
        .signup-link a { color: #667eea; text-decoration: none; font-weight: 600; }
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        .alert.error { background: #fee2e2; color: #dc2626; border-left: 4px solid #dc2626; }
        .alert.success { background: #e0f2fe; color: #0284c7; border-left: 4px solid #0284c7; }
        @media (max-width: 480px) {
            .auth-container { padding: 32px 24px; }
            .social-login { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="auth-container">
        <div class="logo-section">
            <div class="logo-icon"><i class="fas fa-gem"></i></div>
            <h2>Welcome Back ✨</h2>
            <p>Sign in to continue your learning journey</p>
        </div>
        <div class="alert error" id="errorAlert"><i class="fas fa-exclamation-circle"></i><span id="errorMessage"></span></div>
        <div class="alert success" id="successAlert"><i class="fas fa-check-circle"></i><span id="successMessage"></span></div>
        <form id="loginForm">
            <div class="form-group">
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email address" autocomplete="off">
                </div>
            </div>
            <div class="form-group">
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Password">
                    <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                </div>
            </div>
            <div class="checkbox-wrapper">
                <label class="checkbox-label"><input type="checkbox" id="remember"> Remember me</label>
                <a href="#" class="forgot-link" onclick="alert('📧 Password reset link sent to your email!')">Forgot Password?</a>
            </div>
            <button type="submit" class="login-btn" id="loginBtn"><i class="fas fa-arrow-right-to-bracket"></i> Sign In</button>
        </form>
        <div class="divider"><span>or continue with</span></div>
        <div class="social-login">
            <button class="social-btn google" onclick="socialLogin('Google')"><i class="fab fa-google"></i> Google</button>
            <button class="social-btn github" onclick="socialLogin('GitHub')"><i class="fab fa-github"></i> GitHub</button>
        </div>
        <div class="signup-link">Don't have an account? <a href="signup.html">Create account</a></div>
    </div>

    <script>
        // Generate particles
        for(let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 50 + 20;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = Math.random() * 15 + 10 + 's';
            particle.style.animationDelay = Math.random() * 5 + 's';
            document.getElementById('particles').appendChild(particle);
        }

        // Check if already logged in
        if (localStorage.getItem('shridev_user') || sessionStorage.getItem('shridev_user')) {
            window.location.href = 'dashboard.html';
        }

        // Toggle password
        document.getElementById('togglePassword').addEventListener('click', function() {
            const pwd = document.getElementById('password');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
            this.classList.toggle('fa-eye-slash');
        });

        function showError(msg) {
            const alert = document.getElementById('errorAlert');
            document.getElementById('errorMessage').textContent = msg;
            alert.style.display = 'flex';
            setTimeout(() => alert.style.display = 'none', 4000);
        }

        function showSuccess(msg) {
            const alert = document.getElementById('successAlert');
            document.getElementById('successMessage').textContent = msg;
            alert.style.display = 'flex';
            setTimeout(() => alert.style.display = 'none', 3000);
        }

        // Login handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const remember = document.getElementById('remember').checked;
            const btn = document.getElementById('loginBtn');
            
            if (!email) return showError('Please enter your email');
            if (!email.includes('@')) return showError('Please enter a valid email address');
            if (!password) return showError('Please enter your password');
            if (password.length < 3) return showError('Password must be at least 3 characters');
            
            btn.classList.add('loading');
            btn.disabled = true;
            
            try {
                const response = await fetch('http://localhost:5001/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const userData = {
                        id: data.user.id,
                        name: data.user.name,
                        email: data.user.email,
                        branch: data.user.branch,
                        year: data.user.year,
                        avatar: data.user.avatar
                    };
                    
                    if (remember) {
                        localStorage.setItem('shridev_user', JSON.stringify(userData));
                        localStorage.setItem('shridev_token', data.token);
                    } else {
                        sessionStorage.setItem('shridev_user', JSON.stringify(userData));
                        sessionStorage.setItem('shridev_token', data.token);
                    }
                    
                    showSuccess('Login successful! Redirecting...');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    showError(data.message || 'Login failed');
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('Cannot connect to server. Make sure backend is running on port 5000');
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });
        
        function socialLogin(provider) {
            alert(`🔐 ${provider} login coming soon!\n\nPlease use email/password to login.`);
        }
    </script>
</body>
</html>
