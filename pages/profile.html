<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile · Shridev</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-primary: #faf9f6; --text-primary: #2c3e50; --text-secondary: #5e6f8d; --text-soft: #8b9bb5; --accent-2: #d4e0e8; --accent-3: #f0ded2; --gradient-2: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%); --shadow-sm: 0 10px 30px -15px rgba(0,0,0,0.05); --border-radius-xl: 40px; --border-radius-lg: 32px; --font-primary: 'Plus Jakarta Sans', sans-serif; --font-secondary: 'Inter', sans-serif; }
        body { font-family: var(--font-secondary); background: var(--bg-primary); color: var(--text-primary); }
        .bg-soft { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 20%, rgba(216,224,218,0.3) 0%, transparent 30%), radial-gradient(circle at 80% 70%, rgba(240,222,210,0.3) 0%, transparent 40%); z-index: -1; }
        .dashboard { display: flex; min-height: 100vh; max-width: 1600px; margin: 0 auto; padding: 20px; gap: 24px; }
        .sidebar { width: 280px; background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); border-radius: var(--border-radius-xl); padding: 24px 16px; box-shadow: var(--shadow-sm); border: 1px solid rgba(255,255,255,0.5); height: calc(100vh - 40px); position: sticky; top: 20px; }
        .sidebar-header { padding: 8px 16px 24px; border-bottom: 1px solid rgba(0,0,0,0.05); margin-bottom: 24px; }
        .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo i { font-size: 32px; color: var(--text-primary); }
        .logo span { font-family: var(--font-primary); font-size: 24px; font-weight: 700; }
        .sidebar-nav { display: flex; flex-direction: column; gap: 8px; }
        .nav-item { display: flex; align-items: center; padding: 12px 16px; border-radius: var(--border-radius-lg); color: var(--text-secondary); text-decoration: none; gap: 12px; font-weight: 500; transition: all 0.2s; cursor: pointer; }
        .nav-item i { width: 24px; font-size: 1.2rem; color: var(--text-soft); }
        .nav-item:hover { background: rgba(255,255,255,0.8); color: var(--text-primary); transform: translateX(5px); }
        .nav-item.active { background: white; color: var(--text-primary); box-shadow: var(--shadow-sm); }
        .badge { background: var(--accent-3); padding: 4px 8px; border-radius: 30px; font-size: 11px; font-weight: 600; margin-left: auto; }
        .main-content { flex: 1; }
        .header { background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); border-radius: var(--border-radius-xl); padding: 16px 24px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.5); }
        .search { position: relative; width: 300px; }
        .search i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-soft); }
        .search input { width: 100%; padding: 12px 16px 12px 45px; background: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.8); border-radius: 40px; }
        .header-actions { display: flex; align-items: center; gap: 20px; }
        .notification { position: relative; cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.5); border-radius: 50%; }
        .notification .badge { position: absolute; top: -5px; right: -5px; min-width: 20px; height: 20px; padding: 0 6px; }
        .user { display: flex; align-items: center; gap: 12px; padding: 6px 12px 6px 6px; background: rgba(255,255,255,0.5); border-radius: 40px; cursor: pointer; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; }
        .user-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .profile-container { background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); border-radius: var(--border-radius-xl); padding: 32px; max-width: 800px; margin: 0 auto; text-align: center; }
        .profile-avatar { width: 120px; height: 120px; margin: 0 auto 24px; border-radius: 50%; overflow: hidden; border: 4px solid var(--accent-2); }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-name { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .profile-email { color: var(--text-soft); margin-bottom: 24px; }
        .profile-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; margin: 32px 0; }
        .profile-stat { background: rgba(255,255,255,0.5); padding: 20px; border-radius: 20px; }
        .profile-stat h3 { font-size: 28px; font-weight: 700; }
        .btn-logout { padding: 12px 32px; background: var(--accent-3); border: none; border-radius: 30px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-logout:hover { background: #e74c3c; color: white; }
        .mobile-menu-btn { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; background: white; border: none; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; z-index: 1001; }
        @media (max-width: 992px) { .sidebar { position: fixed; left: -280px; z-index: 1000; } .sidebar.active { left: 16px; } .mobile-menu-btn { display: flex; } }
        @media (max-width: 768px) { .header { flex-direction: column; } .search { width: 100%; } .profile-stats { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="bg-soft"></div>
    <button class="mobile-menu-btn" id="menuToggle"><i class="fas fa-bars"></i></button>
    <div class="dashboard">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><div class="logo" onclick="window.location.href='dashboard.html'"><i class="fas fa-gem"></i><span>Shridev<small>·hub</small></span></div></div>
            <nav class="sidebar-nav">
                <div class="nav-item" onclick="window.location.href='dashboard.html'"><i class="fas fa-home"></i><span>Dashboard</span></div>
                <div class="nav-item" onclick="window.location.href='subjects.html'"><i class="fas fa-book-open"></i><span>Subjects</span></div>
                <div class="nav-item" onclick="window.location.href='quiz-generator.html'"><i class="fas fa-robot"></i><span>AI Quiz</span></div>
                <div class="nav-item" onclick="window.location.href='mock-test.html'"><i class="fas fa-clock"></i><span>Mock Tests</span></div>
                <div class="nav-item" onclick="window.location.href='chat.html'"><i class="fas fa-comments"></i><span>Community</span><span class="badge">24</span></div>
                <div class="nav-item" onclick="window.location.href='leaderboard.html'"><i class="fas fa-trophy"></i><span>Leaderboard</span></div>
                <div class="nav-item" onclick="window.location.href='study-planner.html'"><i class="fas fa-calendar-alt"></i><span>Study Planner</span></div>
                <div class="nav-item active" onclick="window.location.href='profile.html'"><i class="fas fa-user"></i><span>Profile</span></div>
            </nav>
        </aside>
        <main class="main-content">
            <header class="header">
                <div class="search"><i class="fas fa-search"></i><input type="text" placeholder="Search..."></div>
                <div class="header-actions"><div class="notification"><i class="fas fa-bell"></i><span class="badge">3</span></div><div class="user" onclick="window.location.href='profile.html'"><div class="user-avatar"><img src="https://ui-avatars.com/api/?name=Dev+Kumar&background=d4e0e8&color=2c3e50" id="profileAvatar"></div><span class="user-name" id="profileName">Dev Kumar</span><i class="fas fa-chevron-down"></i></div></div>
            </header>
            <div class="profile-container">
                <div class="profile-avatar"><img src="https://ui-avatars.com/api/?name=Dev+Kumar&background=d4e0e8&color=2c3e50&size=120" id="avatarImg"></div>
                <div class="profile-name" id="displayName">Dev Kumar</div>
                <div class="profile-email" id="displayEmail">student@shridev.com</div>
                <div class="profile-stats"><div class="profile-stat"><h3>47</h3><p>Quizzes</p></div><div class="profile-stat"><h3>23</h3><p>Day Streak</p></div><div class="profile-stat"><h3>78%</h3><p>Avg Score</p></div></div>
                <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </main>
    </div>
    <script>
        const user = localStorage.getItem('shridev_user') ? JSON.parse(localStorage.getItem('shridev_user')) : (sessionStorage.getItem('shridev_user') ? JSON.parse(sessionStorage.getItem('shridev_user')) : null);
        if (!user) window.location.href = 'login.html';
        document.getElementById('profileName').textContent = user.name;
        document.getElementById('displayName').textContent = user.name;
        document.getElementById('displayEmail').textContent = user.email;
        document.getElementById('avatarImg').src = user.avatar;
        function logout() { if(confirm('Logout?')) { localStorage.clear(); sessionStorage.clear(); window.location.href = 'login.html'; } }
        const menuToggle = document.getElementById('menuToggle'), sidebar = document.getElementById('sidebar');
        if(menuToggle) menuToggle.addEventListener('click', () => sidebar.classList.toggle('active'));
    </script>
</body>
</html>
